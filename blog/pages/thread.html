<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Thread • Rant OS</title>
  <link rel="stylesheet" href="../css/rant.css" />
</head>

<body class="phone">
  <!-- STATUS BAR -->
  <header class="status-bar" aria-label="Phone status bar">
    <div id="phone-time" class="status-time">12:00</div>
    <div class="status-icons">
      <span class="status-icon" aria-hidden="true">📶</span>
      <span class="status-icon" aria-hidden="true">📡</span>
      <img class="status-battery" src="../../assets/icons/battery.png" alt="Battery">
    </div>
  </header>

  <!-- MAIN CONTENT -->
  <main class="shell phone-content">
    <header class="top row">
      <a class="back" id="backToCategory" href="../index.html">← Back</a>
      <div>
        <h1 id="threadTitle">Thread</h1>
        <p class="muted">Claim ↔ Evidence</p>
      </div>
    </header>

    <section id="chat" class="chat" aria-label="Thread conversation"></section>
  </main>

  <!-- ANDROID NAV BAR -->
  <nav class="android-nav" aria-label="Android navigation bar">
    <button class="nav-btn" type="button" onclick="history.back()" aria-label="Back">◁</button>
    <a class="nav-home" href="/home/index.html" aria-label="Home">◯</a>
    <button class="nav-btn" type="button" aria-label="Recents" disabled>▢</button>
  </nav>

  <script src="../data/rantData.js"></script>
  <script src="../js/rant.js"></script>
</body>
</html>
